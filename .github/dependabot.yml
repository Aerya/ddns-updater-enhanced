version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: "weekly"
    groups:
      docker-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: "weekly"
    groups:
      go-modules-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
