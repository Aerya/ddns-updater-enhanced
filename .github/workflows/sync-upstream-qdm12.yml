name: Sync upstream qdm12/ddns-updater

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Clone qdm12 upstream into temp dir
        run: |
          git clone --depth=1 https://github.com/qdm12/ddns-updater.git /tmp/upstream-qdm12

      - name: Sync files from upstream (excluding our own overrides)
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            /tmp/upstream-qdm12/ ./

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get upstream commit info
        if: steps.check.outputs.changed == 'true'
        id: upstream
        run: |
          SHA=$(git -C /tmp/upstream-qdm12 rev-parse --short HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and commit
        if: steps.check.outputs.changed == 'true'
        id: branch
        run: |
          BRANCH="sync/qdm12-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: sync from qdm12/ddns-updater@${{ steps.upstream.outputs.sha }} ($(date +%Y-%m-%d))"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Push branch
        if: steps.check.outputs.changed == 'true'
        run: git push origin "${{ steps.branch.outputs.branch }}"

      - name: Create PR and enable auto-merge
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          gh pr create \
            --title "chore: sync from qdm12/ddns-updater $(date +%Y-%m-%d)" \
            --body "Automatic file sync from upstream [qdm12/ddns-updater](https://github.com/qdm12/ddns-updater) at commit \`${{ steps.upstream.outputs.sha }}\`.

          Files excluded from sync (local overrides kept):
          - \`.github/\` (our own workflows)
          - \`README.md\` (our own documentation)

          This PR will be merged automatically once all checks pass." \
            --base main \
            --head "$BRANCH"
          gh pr merge --auto --squash "$BRANCH" 2>/dev/null || true

      - name: No changes detected
        if: steps.check.outputs.changed == 'false'
        run: echo "No changes from qdm12/ddns-updater. Nothing to do."
